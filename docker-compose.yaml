services:
  cutlery:
    build:
      context: .
      dockerfile: cutlery.dockerfile
    environment:
      IP: "cutlery"
      WAITER_IP: "172.27.0.2"
      WAITER_PORT: "3000"
    ports:
      - "5001:5001"
    container_name: cutlery
    networks: 
      - free_wifi

  philosopher:
    build:
      context: .
      dockerfile: philosopher.dockerfile
    environment:
      IP: "philosopher"
      WAITER_IP: "172.27.0.2"
      WAITER_PORT: "3000"
    ports:
      - "5002:5002"
    container_name: philosopher
    networks: 
      - free_wifi

  waiter:
    build:
      context: .
      dockerfile: waiter.dockerfile
    environment:
      IP: "172.27.0.2"
      WAITER_IP: "172.27.0.2"
      WAITER_PORT: "3000"
    ports:
      - "3000:3000"
    expose:
      - 3000
    container_name: waiter
    networks: 
      free_wifi: 
        ipv4_address: 172.27.0.2

networks:
  free_wifi:
    name: free_wifi
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/16
