services:

  cutlery:
    build: .
    environment:
      IP: "cutlery"
      WAITER_IP: "waiter"
      WAITER_PORT: "3000"
    ports:
      - "5001:5001"
    entrypoint: ["./cutlery"]
    container_name: cutlery
    networks: 
      - free_wifi

  philosopher:
    build: .
    environment:
      IP: "philosopher"
      WAITER_IP: "waiter"
      WAITER_PORT: "3000"
    ports:
      - "5002:5002"
    entrypoint: ["./philosopher"]
    container_name: philosopher
    networks: 
      - free_wifi

  waiter:
    build: .
    command: ./waiter
    environment:
      WAITER_IP: "172.27.0.2"
      WAITER_PORT: "3000"
    ports:
      - "3000:3000"
    entrypoint: ["./waiter"]
    expose:
      - 3000
    container_name: waiter
    networks: 
      free_wifi: 
        ipv4_address: 172.27.0.2

networks:
  free_wifi:
    name: free_wifi
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/16
