services:
  cutlery:
    depends_on:
      - waiter
    build:
      context: .
      dockerfile: cutlery.dockerfile
    environment:
      USERNAME: "Göffel Docker"
      IP: cutlery
      PORT: "5001"
      WAITER_IP: waiter
      WAITER_PORT: "3000"
    ports:
      - "5001:5001"
    container_name: cutlery
    networks: 
      - free_wifi

  philosopher:
    depends_on:
      - waiter
    build:
      context: .
      dockerfile: philosopher.dockerfile
    environment:
      USERNAME: "Rene Descartes Docker"
      WISDOM: "While we thus reject all of which we can entertain the smallest doubt, and even imagine that it is false, we easily indeed suppose that there is neither God, nor sky, nor bodies, and that we ourselves even have neither hands nor feet, nor, finally, a body; but we cannot in the same way suppose that we are not while we doubt of the truth of these things; for there is a repugnance in conceiving that what thinks does not exist at the very time when it thinks. Accordingly, the knowledge, I think, therefore I am, is the first and most certain that occurs to one who philosophizes orderly."
      IP: philosopher
      PORT: "5002"
      WAITER_IP: "172.18.0.2"
      WAITER_PORT: "3000"
    ports:
      - "5002:5002"
    container_name: philosopher
    networks: 
      - free_wifi

  waiter:
    build:
      context: .
      dockerfile: waiter.dockerfile
    ports:
      - "3000:3000"
    expose:
      - 3000
    container_name: waiter
    networks: 
      free_wifi: 
        ipv4_address: 172.18.0.2

networks:
  free_wifi:
    name: free_wifi
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
